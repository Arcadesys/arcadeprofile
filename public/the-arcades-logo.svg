<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60">
  <defs>
    <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a00"/>
      <stop offset="100%" style="stop-color:#ff3cac"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orange crescent eclipse ring -->
  <g transform="translate(30, 30)" filter="url(#glow)">
    <!-- Main crescent ring - open on the right like V13 -->
    <path d="M0,-16 A16,16 0 1,0 0,16 A12,12 0 1,1 0,-16Z" fill="none" stroke="url(#crescentGrad)" stroke-width="3" opacity="0.95"/>
    <!-- Inner warm glow -->
    <circle cx="-2" cy="0" r="6" fill="#ff8a00" opacity="0.15"/>
  </g>

  <!-- THE ARCADES text - neon pink, single line -->
  <g filter="url(#textglow)">
    <text x="58" y="36" font-family="'Inter', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="5" fill="#ff3cac" opacity="0.95">THE ARCADES</text>
  </g>
</svg>