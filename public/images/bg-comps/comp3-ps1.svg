<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="ps1sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="60%" stop-color="#0e0e1e"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="ps1corona1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <linearGradient id="ps1corona2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3cac"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <filter id="ps1glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="ps1glow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <!-- Dither pattern for PS1 texture -->
    <pattern id="dither" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="2" height="2" fill="#0a0a14" opacity="0.15"/>
      <rect x="2" y="2" width="2" height="2" fill="#0a0a14" opacity="0.15"/>
    </pattern>
    <!-- Vertex jitter via polygon shapes (simulating PS1 wobbly geometry) -->
  </defs>

  <!-- Sky gradient -->
  <rect width="1920" height="1080" fill="url(#ps1sky)"/>

  <!-- Ground plane — PS1 style flat-shaded floor with perspective lines -->
  <polygon points="0,1080 1920,1080 1920,680 0,680" fill="#0c0c1a"/>
  <polygon points="0,1080 1920,1080 1920,680 0,680" fill="#100f22" opacity="0.5"/>

  <!-- Perspective grid lines on ground — Battlezone style -->
  <g stroke="#ff8a00" stroke-width="0.6" opacity="0.12">
    <!-- Horizontal lines receding -->
    <line x1="0" y1="700" x2="1920" y2="700"/>
    <line x1="0" y1="730" x2="1920" y2="730"/>
    <line x1="0" y1="770" x2="1920" y2="770"/>
    <line x1="0" y1="820" x2="1920" y2="820"/>
    <line x1="0" y1="880" x2="1920" y2="880"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="0" y1="1060" x2="1920" y2="1060"/>
  </g>
  <g stroke="#ff3cac" stroke-width="0.4" opacity="0.08">
    <!-- Vanishing-point lines from center bottom -->
    <line x1="960" y1="680" x2="0" y2="1080"/>
    <line x1="960" y1="680" x2="192" y2="1080"/>
    <line x1="960" y1="680" x2="384" y2="1080"/>
    <line x1="960" y1="680" x2="576" y2="1080"/>
    <line x1="960" y1="680" x2="768" y2="1080"/>
    <line x1="960" y1="680" x2="1152" y2="1080"/>
    <line x1="960" y1="680" x2="1344" y2="1080"/>
    <line x1="960" y1="680" x2="1536" y2="1080"/>
    <line x1="960" y1="680" x2="1728" y2="1080"/>
    <line x1="960" y1="680" x2="1920" y2="1080"/>
  </g>

  <!-- Main eclipse — large, center-sky, low-poly corona -->
  <!-- Corona glow underlayer -->
  <circle cx="960" cy="320" r="160" fill="none" stroke="#ff8a00" stroke-width="20" opacity="0.08" filter="url(#ps1glow2)"/>
  <!-- Low-poly corona ring — jagged polygon approximating a circle -->
  <polygon points="960,150 1010,160 1050,185 1080,215 1100,260 1110,310 1105,360 1085,405 1055,435 1015,460 960,470 905,460 865,435 835,405 815,360 810,310 820,260 840,215 870,185 910,160"
    fill="none" stroke="url(#ps1corona1)" stroke-width="2" opacity="0.6" stroke-linejoin="bevel"/>
  <!-- Slightly offset wobbly inner ring -->
  <polygon points="962,165 1005,173 1042,195 1070,222 1088,262 1095,310 1092,355 1074,395 1048,425 1010,448 962,456 914,448 878,425 852,395 836,355 832,310 838,262 856,222 884,195 921,173"
    fill="none" stroke="#ff8a00" stroke-width="1" opacity="0.25" stroke-linejoin="bevel"/>
  <!-- Occluding body — slightly offset polygon (not perfectly round = PS1 vibe) -->
  <polygon points="980,175 1025,188 1058,210 1082,240 1094,278 1098,318 1090,358 1070,390 1042,415 1005,432 965,438 928,430 896,410 872,382 858,348 854,310 860,272 876,240 900,215 935,192"
    fill="#0a0a14"/>
  <!-- Corona leak — visible crescent glow on left side -->
  <path d="M 870 200 Q 830 260 825 330 Q 830 400 870 450" fill="none" stroke="#ff8a00" stroke-width="3" opacity="0.5" filter="url(#ps1glow)"/>
  <path d="M 885 215 Q 850 270 845 330 Q 850 390 885 435" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.3"/>

  <!-- Second eclipse — upper left, smaller, pink-toned -->
  <polygon points="320,180 345,172 365,178 382,192 390,212 388,234 376,252 358,262 335,265 314,258 300,244 294,224 298,202 308,188"
    fill="none" stroke="#ff3cac" stroke-width="1.5" opacity="0.45" stroke-linejoin="bevel"/>
  <polygon points="335,178 356,180 372,192 380,210 378,230 368,246 350,254 332,254 318,244 310,228 312,210 320,194"
    fill="#0a0a14"/>
  <path d="M 304 195 Q 292 215 290 235 Q 294 255 308 268" fill="none" stroke="#ff3cac" stroke-width="2" opacity="0.35" filter="url(#ps1glow)"/>

  <!-- Third eclipse — right side, magenta -->
  <polygon points="1540,420 1560,412 1578,416 1592,428 1598,445 1596,464 1586,478 1570,486 1550,488 1534,482 1522,470 1518,452 1522,436 1530,424"
    fill="none" stroke="#ff6b9d" stroke-width="1.2" opacity="0.4" stroke-linejoin="bevel"/>
  <polygon points="1552,418 1568,420 1580,430 1586,444 1584,460 1576,472 1562,478 1546,478 1534,470 1528,456 1530,440 1540,428"
    fill="#0a0a14"/>

  <!-- Ritual symbol on the ground plane — triangle/pyramid shape -->
  <polygon points="960,700 860,780 1060,780" fill="none" stroke="#ff8a00" stroke-width="1" opacity="0.2" stroke-linejoin="bevel"/>
  <polygon points="960,720 890,780 1030,780" fill="none" stroke="#ff3cac" stroke-width="0.8" opacity="0.15" stroke-linejoin="bevel"/>
  <!-- Inner eye/circle in pyramid -->
  <polygon points="960,740 945,758 952,772 968,772 975,758" fill="none" stroke="#ffaa00" stroke-width="0.8" opacity="0.2" stroke-linejoin="bevel"/>

  <!-- Floating low-poly obelisk silhouettes on horizon -->
  <polygon points="200,680 215,580 230,680" fill="#0e0e1e" stroke="#ff8a00" stroke-width="0.5" opacity="0.15"/>
  <polygon points="1680,680 1700,560 1720,680" fill="#0e0e1e" stroke="#ff3cac" stroke-width="0.5" opacity="0.12"/>
  <polygon points="1200,680 1210,620 1220,680" fill="#0e0e1e" stroke="#ffaa00" stroke-width="0.4" opacity="0.1"/>

  <!-- PS1 vertex stars — small triangles instead of circles -->
  <polygon points="150,100 152,94 154,100" fill="#e8e8ec" opacity="0.3"/>
  <polygon points="500,60 502,54 504,60" fill="#e8e8ec" opacity="0.25"/>
  <polygon points="780,130 782,124 784,130" fill="#e8e8ec" opacity="0.2"/>
  <polygon points="1100,80 1102,74 1104,80" fill="#e8e8ec" opacity="0.3"/>
  <polygon points="1400,150 1402,144 1404,150" fill="#e8e8ec" opacity="0.2"/>
  <polygon points="1750,90 1752,84 1754,90" fill="#e8e8ec" opacity="0.25"/>
  <polygon points="400,520 402,514 404,520" fill="#e8e8ec" opacity="0.15"/>
  <polygon points="1300,400 1302,394 1304,400" fill="#e8e8ec" opacity="0.18"/>
  <polygon points="650,250 652,244 654,250" fill="#e8e8ec" opacity="0.2"/>
  <polygon points="1830,300 1832,294 1834,300" fill="#e8e8ec" opacity="0.15"/>

  <!-- Dither overlay for that PS1 texture feel -->
  <rect width="1920" height="1080" fill="url(#dither)" opacity="0.4"/>
</svg>