<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="wmsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0e0d1c"/>
    </linearGradient>
    <linearGradient id="wmstroke1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3cac"/>
      <stop offset="50%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ff3cac"/>
    </linearGradient>
    <linearGradient id="wmstroke2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff8a00"/>
    </linearGradient>
    <filter id="wmglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="wmglow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#wmsky)"/>

  <!-- Eclipse cluster — floating above mountains -->
  <!-- Main eclipse -->
  <circle cx="960" cy="220" r="100" fill="none" stroke="#ff8a00" stroke-width="1.5" opacity="0.5"/>
  <circle cx="960" cy="220" r="100" fill="none" stroke="#ff8a00" stroke-width="6" opacity="0.08" filter="url(#wmglow2)"/>
  <circle cx="978" cy="210" r="88" fill="#0a0a14"/>
  <!-- Corona leak -->
  <path d="M 865 195 Q 850 220 855 255 Q 865 280 880 295" fill="none" stroke="#ff8a00" stroke-width="1.2" opacity="0.4" filter="url(#wmglow)"/>

  <!-- Small eclipse left -->
  <circle cx="620" cy="160" r="35" fill="none" stroke="#ff3cac" stroke-width="1" opacity="0.35"/>
  <circle cx="628" cy="155" r="30" fill="#0a0a14"/>

  <!-- Small eclipse right -->
  <circle cx="1380" cy="180" r="28" fill="none" stroke="#ffaa00" stroke-width="0.8" opacity="0.3"/>
  <circle cx="1386" cy="176" r="24" fill="#0a0a14"/>

  <!-- Ritual circle connecting eclipses -->
  <circle cx="960" cy="280" r="380" fill="none" stroke="#ff3cac" stroke-width="0.3" opacity="0.06"/>
  <circle cx="960" cy="280" r="420" fill="none" stroke="#ff8a00" stroke-width="0.2" opacity="0.04"/>

  <!-- WIREFRAME MOUNTAIN RANGE — back layer (far mountains, dimmer) -->
  <g fill="none" stroke="#ff8a00" stroke-width="0.6" opacity="0.15">
    <polyline points="0,620 60,580 120,600 180,540 240,570 320,490 380,530 440,480 520,510 580,460 640,500 720,430 780,470 840,420 900,450 960,380 1020,430 1080,400 1140,450 1200,410 1280,460 1340,420 1400,480 1460,440 1520,490 1580,450 1640,510 1700,470 1760,530 1820,500 1880,550 1920,520"/>
    <!-- Vertical wireframe lines from peaks to base -->
    <line x1="320" y1="490" x2="320" y2="620"/>
    <line x1="440" y1="480" x2="440" y2="620"/>
    <line x1="580" y1="460" x2="580" y2="620"/>
    <line x1="720" y1="430" x2="720" y2="620"/>
    <line x1="840" y1="420" x2="840" y2="620"/>
    <line x1="960" y1="380" x2="960" y2="620"/>
    <line x1="1080" y1="400" x2="1080" y2="620"/>
    <line x1="1200" y1="410" x2="1200" y2="620"/>
    <line x1="1340" y1="420" x2="1340" y2="620"/>
    <line x1="1460" y1="440" x2="1460" y2="620"/>
    <line x1="1580" y1="450" x2="1580" y2="620"/>
    <line x1="1700" y1="470" x2="1700" y2="620"/>
  </g>

  <!-- Cross-hatching on back mountains -->
  <g fill="none" stroke="#ff8a00" stroke-width="0.3" opacity="0.07">
    <line x1="320" y1="490" x2="440" y2="620"/>
    <line x1="440" y1="480" x2="580" y2="620"/>
    <line x1="580" y1="460" x2="720" y2="620"/>
    <line x1="720" y1="430" x2="840" y2="620"/>
    <line x1="840" y1="420" x2="960" y2="620"/>
    <line x1="960" y1="380" x2="1080" y2="620"/>
    <line x1="1080" y1="400" x2="1200" y2="620"/>
    <line x1="1200" y1="410" x2="1340" y2="620"/>
    <line x1="1340" y1="420" x2="1460" y2="620"/>
    <line x1="1460" y1="440" x2="1580" y2="620"/>
    <line x1="1580" y1="450" x2="1700" y2="620"/>
  </g>

  <!-- WIREFRAME MOUNTAIN RANGE — front layer (closer, brighter, pink-orange) -->
  <g fill="none" stroke="url(#wmstroke1)" stroke-width="1" opacity="0.35">
    <polyline points="0,750 80,700 140,730 200,660 280,700 350,620 420,670 500,600 570,650 650,570 720,620 800,550 880,590 960,520 1040,570 1120,530 1180,580 1260,540 1340,590 1420,550 1500,600 1560,560 1640,620 1720,580 1800,640 1860,610 1920,660"/>
  </g>
  <!-- Glow underlayer for front range -->
  <g fill="none" stroke="#ff8a00" stroke-width="3" opacity="0.06" filter="url(#wmglow)">
    <polyline points="0,750 80,700 140,730 200,660 280,700 350,620 420,670 500,600 570,650 650,570 720,620 800,550 880,590 960,520 1040,570 1120,530 1180,580 1260,540 1340,590 1420,550 1500,600 1560,560 1640,620 1720,580 1800,640 1860,610 1920,660"/>
  </g>

  <!-- Front range vertical wireframe lines -->
  <g fill="none" stroke="#ff3cac" stroke-width="0.5" opacity="0.15">
    <line x1="200" y1="660" x2="200" y2="850"/>
    <line x1="350" y1="620" x2="350" y2="850"/>
    <line x1="500" y1="600" x2="500" y2="850"/>
    <line x1="650" y1="570" x2="650" y2="850"/>
    <line x1="800" y1="550" x2="800" y2="850"/>
    <line x1="960" y1="520" x2="960" y2="850"/>
    <line x1="1120" y1="530" x2="1120" y2="850"/>
    <line x1="1260" y1="540" x2="1260" y2="850"/>
    <line x1="1420" y1="550" x2="1420" y2="850"/>
    <line x1="1560" y1="560" x2="1560" y2="850"/>
    <line x1="1720" y1="580" x2="1720" y2="850"/>
    <line x1="1860" y1="610" x2="1860" y2="850"/>
  </g>

  <!-- Diagonal wireframe fills on front mountains -->
  <g fill="none" stroke="#ff8a00" stroke-width="0.3" opacity="0.1">
    <line x1="200" y1="660" x2="350" y2="850"/>
    <line x1="350" y1="620" x2="500" y2="850"/>
    <line x1="500" y1="600" x2="650" y2="850"/>
    <line x1="650" y1="570" x2="800" y2="850"/>
    <line x1="800" y1="550" x2="960" y2="850"/>
    <line x1="960" y1="520" x2="1120" y2="850"/>
    <line x1="1120" y1="530" x2="1260" y2="850"/>
    <line x1="1260" y1="540" x2="1420" y2="850"/>
    <line x1="1420" y1="550" x2="1560" y2="850"/>
    <line x1="1560" y1="560" x2="1720" y2="850"/>
    <line x1="1720" y1="580" x2="1860" y2="850"/>
    <!-- Reverse diagonals -->
    <line x1="350" y1="620" x2="200" y2="850"/>
    <line x1="500" y1="600" x2="350" y2="850"/>
    <line x1="650" y1="570" x2="500" y2="850"/>
    <line x1="800" y1="550" x2="650" y2="850"/>
    <line x1="960" y1="520" x2="800" y2="850"/>
    <line x1="1120" y1="530" x2="960" y2="850"/>
    <line x1="1260" y1="540" x2="1120" y2="850"/>
    <line x1="1420" y1="550" x2="1260" y2="850"/>
    <line x1="1560" y1="560" x2="1420" y2="850"/>
    <line x1="1720" y1="580" x2="1560" y2="850"/>
  </g>

  <!-- Horizontal contour lines on front range -->
  <g fill="none" stroke="#ff3cac" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="650" x2="1920" y2="650"/>
    <line x1="0" y1="700" x2="1920" y2="700"/>
    <line x1="0" y1="750" x2="1920" y2="750"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
  </g>

  <!-- Ground plane — Battlezone grid receding to horizon -->
  <g stroke="#ff8a00" stroke-width="0.4" opacity="0.08">
    <line x1="0" y1="860" x2="1920" y2="860"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="950" x2="1920" y2="950"/>
    <line x1="0" y1="1010" x2="1920" y2="1010"/>
    <line x1="0" y1="1080" x2="1920" y2="1080"/>
  </g>
  <g stroke="#ff3cac" stroke-width="0.3" opacity="0.05">
    <line x1="960" y1="850" x2="0" y2="1080"/>
    <line x1="960" y1="850" x2="320" y2="1080"/>
    <line x1="960" y1="850" x2="640" y2="1080"/>
    <line x1="960" y1="850" x2="1280" y2="1080"/>
    <line x1="960" y1="850" x2="1600" y2="1080"/>
    <line x1="960" y1="850" x2="1920" y2="1080"/>
  </g>

  <!-- Ritual waypoint marker on central peak -->
  <g opacity="0.3">
    <line x1="960" y1="500" x2="960" y2="520" stroke="#ffaa00" stroke-width="1"/>
    <circle cx="960" cy="495" r="5" fill="none" stroke="#ffaa00" stroke-width="0.8"/>
    <circle cx="960" cy="495" r="12" fill="none" stroke="#ff8a00" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- Stars -->
  <circle cx="150" cy="80" r="1" fill="#e8e8ec" opacity="0.3"/>
  <circle cx="420" cy="120" r="0.8" fill="#e8e8ec" opacity="0.25"/>
  <circle cx="700" cy="60" r="1.2" fill="#e8e8ec" opacity="0.2"/>
  <circle cx="1100" cy="90" r="0.8" fill="#e8e8ec" opacity="0.3"/>
  <circle cx="1500" cy="70" r="1" fill="#e8e8ec" opacity="0.25"/>
  <circle cx="1780" cy="140" r="0.8" fill="#e8e8ec" opacity="0.2"/>
  <circle cx="300" cy="300" r="0.6" fill="#e8e8ec" opacity="0.15"/>
  <circle cx="1650" cy="280" r="0.7" fill="#e8e8ec" opacity="0.18"/>
  <circle cx="80" cy="400" r="0.8" fill="#e8e8ec" opacity="0.12"/>
  <circle cx="1850" cy="350" r="0.6" fill="#e8e8ec" opacity="0.15"/>
</svg>