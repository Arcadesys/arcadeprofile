<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3cac" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff3cac" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
    <!-- Milky sky gradient — fades from warm haze at horizon to deep dark at top -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0a0a14" stop-opacity="1"/>
      <stop offset="85%" stop-color="#1a1028" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2a1830" stop-opacity="1"/>
    </linearGradient>
    <!-- Horizon glow -->
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a00" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#ff3cac" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a14" stop-opacity="0"/>
    </linearGradient>
    <!-- Eclipse corona effect -->
    <filter id="corona">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="starglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Deep sky background with milky warmth near horizon -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- Horizon glow band -->
  <rect x="0" y="680" width="1920" height="400" fill="url(#horizonGlow)"/>

  <!-- Subtle ambient glows -->
  <ellipse cx="380" cy="400" rx="500" ry="400" fill="url(#glow1)"/>
  <ellipse cx="1500" cy="250" rx="600" ry="450" fill="url(#glow2)"/>
  <ellipse cx="960" cy="800" rx="700" ry="350" fill="url(#glow3)"/>

  <!-- ==================== STARFIELD ==================== -->
  <!-- Bright stars -->
  <circle cx="120" cy="45" r="1.2" fill="#e8e8ec" opacity="0.5"/>
  <circle cx="285" cy="92" r="1.4" fill="#e8e8ec" opacity="0.45"/>
  <circle cx="430" cy="30" r="1" fill="#e8e8ec" opacity="0.4"/>
  <circle cx="580" cy="115" r="1.3" fill="#e8e8ec" opacity="0.35"/>
  <circle cx="710" cy="55" r="1.5" fill="#ffe8cc" opacity="0.5"/>
  <circle cx="870" cy="40" r="1.1" fill="#e8e8ec" opacity="0.4"/>
  <circle cx="1020" cy="88" r="1.3" fill="#e8e8ec" opacity="0.45"/>
  <circle cx="1180" cy="35" r="1" fill="#ffe8cc" opacity="0.38"/>
  <circle cx="1350" cy="72" r="1.4" fill="#e8e8ec" opacity="0.42"/>
  <circle cx="1520" cy="50" r="1.2" fill="#e8e8ec" opacity="0.5"/>
  <circle cx="1680" cy="95" r="1.1" fill="#e8e8ec" opacity="0.35"/>
  <circle cx="1830" cy="38" r="1.3" fill="#ffe8cc" opacity="0.4"/>

  <!-- Mid-field stars -->
  <circle cx="65" cy="180" r="0.9" fill="#e8e8ec" opacity="0.3"/>
  <circle cx="190" cy="250" r="0.7" fill="#e8e8ec" opacity="0.25"/>
  <circle cx="340" cy="195" r="1" fill="#e8e8ec" opacity="0.28"/>
  <circle cx="480" cy="310" r="0.8" fill="#e8e8ec" opacity="0.22"/>
  <circle cx="620" cy="230" r="0.9" fill="#ffe8cc" opacity="0.3"/>
  <circle cx="760" cy="175" r="0.7" fill="#e8e8ec" opacity="0.2"/>
  <circle cx="910" cy="290" r="0.8" fill="#e8e8ec" opacity="0.25"/>
  <circle cx="1060" cy="210" r="1" fill="#e8e8ec" opacity="0.3"/>
  <circle cx="1200" cy="315" r="0.7" fill="#e8e8ec" opacity="0.22"/>
  <circle cx="1390" cy="195" r="0.9" fill="#ffe8cc" opacity="0.28"/>
  <circle cx="1550" cy="280" r="0.8" fill="#e8e8ec" opacity="0.2"/>
  <circle cx="1720" cy="230" r="0.7" fill="#e8e8ec" opacity="0.25"/>
  <circle cx="1870" cy="175" r="0.9" fill="#e8e8ec" opacity="0.3"/>

  <!-- Dim scattered stars -->
  <circle cx="150" cy="380" r="0.6" fill="#e8e8ec" opacity="0.18"/>
  <circle cx="310" cy="520" r="0.5" fill="#e8e8ec" opacity="0.15"/>
  <circle cx="530" cy="430" r="0.7" fill="#e8e8ec" opacity="0.16"/>
  <circle cx="670" cy="380" r="0.5" fill="#e8e8ec" opacity="0.14"/>
  <circle cx="820" cy="500" r="0.6" fill="#e8e8ec" opacity="0.18"/>
  <circle cx="1000" cy="420" r="0.5" fill="#e8e8ec" opacity="0.15"/>
  <circle cx="1150" cy="550" r="0.7" fill="#e8e8ec" opacity="0.14"/>
  <circle cx="1300" cy="480" r="0.5" fill="#e8e8ec" opacity="0.16"/>
  <circle cx="1460" cy="400" r="0.6" fill="#e8e8ec" opacity="0.18"/>
  <circle cx="1630" cy="520" r="0.5" fill="#e8e8ec" opacity="0.12"/>
  <circle cx="1780" cy="440" r="0.6" fill="#e8e8ec" opacity="0.15"/>
  <circle cx="50" cy="580" r="0.5" fill="#e8e8ec" opacity="0.12"/>
  <circle cx="1900" cy="350" r="0.5" fill="#e8e8ec" opacity="0.13"/>

  <!-- A few brighter accent stars with glow -->
  <circle cx="710" cy="55" r="3" fill="#ffe8cc" opacity="0.08" filter="url(#starglow)"/>
  <circle cx="285" cy="92" r="2.5" fill="#e8e8ec" opacity="0.06" filter="url(#starglow)"/>
  <circle cx="1520" cy="50" r="3" fill="#e8e8ec" opacity="0.07" filter="url(#starglow)"/>

  <!-- ==================== ECLIPSES ==================== -->

  <!-- Primary eclipse — large, upper right -->
  <circle cx="1340" cy="280" r="120" fill="none" stroke="#ff8a00" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1340" cy="280" r="120" fill="none" stroke="#ff8a00" stroke-width="4" opacity="0.15" filter="url(#softglow)"/>
  <!-- Occluding body -->
  <circle cx="1365" cy="265" r="105" fill="#0a0a14"/>
  <!-- Corona wisps -->
  <path d="M 1225 250 Q 1200 280 1220 310" fill="none" stroke="#ff8a00" stroke-width="0.8" opacity="0.4"/>
  <path d="M 1240 200 Q 1220 230 1235 260" fill="none" stroke="#ffaa00" stroke-width="0.6" opacity="0.3"/>

  <!-- Secondary eclipse — medium, left -->
  <circle cx="350" cy="450" r="80" fill="none" stroke="#ff3cac" stroke-width="1.2" opacity="0.5"/>
  <circle cx="350" cy="450" r="80" fill="none" stroke="#ff3cac" stroke-width="3" opacity="0.12" filter="url(#softglow)"/>
  <circle cx="370" cy="438" r="70" fill="#0a0a14"/>
  <path d="M 275 430 Q 260 450 270 475" fill="none" stroke="#ff3cac" stroke-width="0.6" opacity="0.35"/>

  <!-- Tertiary eclipse — small, lower center -->
  <circle cx="880" cy="620" r="50" fill="none" stroke="#ff6b9d" stroke-width="1" opacity="0.4"/>
  <circle cx="880" cy="620" r="50" fill="none" stroke="#ff6b9d" stroke-width="2.5" opacity="0.1" filter="url(#softglow)"/>
  <circle cx="893" cy="612" r="43" fill="#0a0a14"/>

  <!-- Fourth eclipse — tiny, accent -->
  <circle cx="1600" cy="550" r="30" fill="none" stroke="#ffaa00" stroke-width="0.8" opacity="0.35"/>
  <circle cx="1600" cy="550" r="30" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.08" filter="url(#softglow)"/>
  <circle cx="1610" cy="544" r="26" fill="#0a0a14"/>

  <!-- ==================== RITUAL GEOMETRY ==================== -->

  <!-- Concentric rings connecting eclipses -->
  <circle cx="960" cy="440" r="400" fill="none" stroke="#ff8a00" stroke-width="0.3" opacity="0.12"/>
  <circle cx="960" cy="440" r="500" fill="none" stroke="#ff3cac" stroke-width="0.25" opacity="0.08"/>
  <circle cx="960" cy="440" r="320" fill="none" stroke="#ffaa00" stroke-width="0.2" opacity="0.1"/>

  <!-- Connecting lines — ritual paths -->
  <line x1="350" y1="450" x2="880" y2="620" stroke="#ff3cac" stroke-width="0.3" opacity="0.08"/>
  <line x1="880" y1="620" x2="1340" y2="280" stroke="#ff8a00" stroke-width="0.3" opacity="0.08"/>
  <line x1="1340" y1="280" x2="350" y2="450" stroke="#ff6b9d" stroke-width="0.3" opacity="0.08"/>
  <line x1="1600" y1="550" x2="880" y2="620" stroke="#ffaa00" stroke-width="0.2" opacity="0.06"/>

  <!-- ==================== WIREFRAME LINES ==================== -->

  <!-- Perspective grid lines converging at horizon vanishing point (960, 750) -->
  <!-- Vertical fan lines from vanishing point -->
  <line x1="960" y1="750" x2="0" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="960" y1="750" x2="192" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.05"/>
  <line x1="960" y1="750" x2="384" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="960" y1="750" x2="576" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.05"/>
  <line x1="960" y1="750" x2="768" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="960" y1="750" x2="960" y2="1080" stroke="#ff8a00" stroke-width="0.35" opacity="0.07"/>
  <line x1="960" y1="750" x2="1152" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="960" y1="750" x2="1344" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.05"/>
  <line x1="960" y1="750" x2="1536" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="960" y1="750" x2="1728" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.05"/>
  <line x1="960" y1="750" x2="1920" y2="1080" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>

  <!-- Horizontal wireframe lines — perspective-scaled spacing -->
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#ff8a00" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="815" x2="1920" y2="815" stroke="#ff8a00" stroke-width="0.2" opacity="0.05"/>
  <line x1="0" y1="855" x2="1920" y2="855" stroke="#ff8a00" stroke-width="0.25" opacity="0.05"/>
  <line x1="0" y1="900" x2="1920" y2="900" stroke="#ff8a00" stroke-width="0.25" opacity="0.06"/>
  <line x1="0" y1="950" x2="1920" y2="950" stroke="#ff8a00" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="1010" x2="1920" y2="1010" stroke="#ff8a00" stroke-width="0.3" opacity="0.07"/>

  <!-- ==================== STYLIZED HORIZON LINE ==================== -->

  <!-- Horizon glow line -->
  <line x1="0" y1="750" x2="1920" y2="750" stroke="#ff8a00" stroke-width="1.5" opacity="0.08" filter="url(#softglow)"/>
  <line x1="0" y1="750" x2="1920" y2="750" stroke="#ff8a00" stroke-width="0.5" opacity="0.15"/>

  <!-- Stylized horizon silhouette — gentle rolling terrain -->
  <path d="M 0 755 Q 120 740 240 750 Q 360 730 480 745 Q 550 738 620 748 Q 720 725 820 740 Q 900 732 960 742 Q 1040 728 1120 738 Q 1200 730 1280 745 Q 1380 720 1480 735 Q 1560 728 1640 740 Q 1740 732 1820 745 Q 1870 738 1920 748 L 1920 755 L 0 755 Z" fill="#0a0a14" opacity="0.9"/>

  <!-- Horizon wireframe detail — subtle terrain wireframe above silhouette -->
  <path d="M 0 755 Q 120 740 240 750 Q 360 730 480 745 Q 550 738 620 748 Q 720 725 820 740 Q 900 732 960 742 Q 1040 728 1120 738 Q 1200 730 1280 745 Q 1380 720 1480 735 Q 1560 728 1640 740 Q 1740 732 1820 745 Q 1870 738 1920 748" fill="none" stroke="#ff3cac" stroke-width="0.5" opacity="0.2"/>

  <!-- Second layer terrain — slightly lower, dimmer -->
  <path d="M 0 760 Q 100 752 200 758 Q 340 745 480 755 Q 580 750 680 758 Q 800 740 920 752 Q 1000 748 1080 755 Q 1200 742 1320 752 Q 1440 746 1560 755 Q 1680 748 1800 758 Q 1860 752 1920 760" fill="none" stroke="#ff8a00" stroke-width="0.35" opacity="0.12"/>

  <!-- Small wireframe cross-struts on horizon for structure feel -->
  <line x1="240" y1="750" x2="240" y2="760" stroke="#ff3cac" stroke-width="0.25" opacity="0.1"/>
  <line x1="480" y1="745" x2="480" y2="758" stroke="#ff3cac" stroke-width="0.25" opacity="0.1"/>
  <line x1="720" y1="725" x2="720" y2="750" stroke="#ff3cac" stroke-width="0.25" opacity="0.12"/>
  <line x1="960" y1="742" x2="960" y2="755" stroke="#ff3cac" stroke-width="0.25" opacity="0.1"/>
  <line x1="1200" y1="730" x2="1200" y2="752" stroke="#ff3cac" stroke-width="0.25" opacity="0.1"/>
  <line x1="1480" y1="735" x2="1480" y2="755" stroke="#ff3cac" stroke-width="0.25" opacity="0.12"/>
  <line x1="1740" y1="732" x2="1740" y2="758" stroke="#ff3cac" stroke-width="0.25" opacity="0.1"/>

  <!-- Waypoint markers on horizon peaks -->
  <circle cx="720" cy="725" r="2" fill="none" stroke="#ff3cac" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1380" cy="720" r="2" fill="none" stroke="#ff8a00" stroke-width="0.5" opacity="0.18"/>
  <line x1="720" y1="718" x2="720" y2="722" stroke="#ff3cac" stroke-width="0.4" opacity="0.2"/>
  <line x1="1380" y1="713" x2="1380" y2="717" stroke="#ff8a00" stroke-width="0.4" opacity="0.18"/>
</svg>
